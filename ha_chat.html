<!DOCTYPE html>
<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Hermes Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#041c1c;--surface:rgba(255,230,203,.03);--border:rgba(255,230,203,.08);--text:#ffe6cb;--text2:rgba(255,230,203,.5);--text3:rgba(255,230,203,.25);--accent:#a78bfa;--user-bg:rgba(167,139,250,.1);--assistant-bg:rgba(255,230,203,.03);--green:rgba(74,222,128,.7);--red:rgba(239,68,68,.7)}
body{background:var(--bg);color:var(--text);font:13px/1.5 Inter,system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{flex-shrink:0;display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;background:var(--bg)}
.header .logo{font-size:16px;font-weight:700;color:var(--accent)}.header .sub{font-size:10px;color:var(--text3)}
.header .tabs{display:flex;gap:2px;margin-left:auto;background:rgba(255,230,203,.03);border-radius:6px;padding:2px}.tab{padding:4px 10px;font-size:10px;font-weight:600;cursor:pointer;color:var(--text2);border-radius:4px;transition:all .12s}.tab.active{background:rgba(255,230,203,.06);color:var(--text)}
.chats-panel{width:260px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.chats-list{flex:1;overflow-y:auto;padding:8px}
.chat-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:all .12s;position:relative}
.chat-item:hover{background:var(--surface)}.chat-item.active{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.15)}
.chat-item .title{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:20px}
.chat-item .meta{font-size:9px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px}
.chat-item .model-badge{font-size:7px;padding:1px 4px;border-radius:3px;background:rgba(167,139,250,.1);color:rgba(167,139,250,.6)}
.chat-item .actions{position:absolute;right:6px;top:6px;display:none;gap:2px}
.chat-item:hover .actions{display:flex}
.chat-item .act-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px}.chat-item .act-btn:hover{color:var(--text);background:var(--surface)}
.new-chat{padding:8px 10px;margin:4px 8px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font:inherit;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}.new-chat:hover{opacity:.9}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.chat-header{display:none;padding:10px 16px;border-bottom:1px solid var(--border);align-items:center;gap:8px;flex-shrink:0}
.chat-header .chat-title{font-size:13px;font-weight:600;color:var(--text);cursor:pointer}.chat-header .chat-title:hover{color:var(--accent)}
.chat-header select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--text);font:inherit;font-size:10px;outline:none;cursor:pointer;margin-left:auto}
.chat-header select:focus{border-color:rgba(167,139,250,.3)}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.6;animation:slideIn .2s ease-out;position:relative}
.msg.user{align-self:flex-end;background:var(--user-bg);border:1px solid rgba(167,139,250,.1)}
.msg.assistant{align-self:flex-start;background:var(--assistant-bg);border:1px solid var(--border)}
.msg .role{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.msg .content{white-space:pre-wrap;word-break:break-word}
.msg .time{font-size:9px;color:var(--text3);margin-top:6px}
.msg .content code{font-size:11px;background:rgba(255,230,203,.06);padding:1px 4px;border-radius:3px}
.msg .content pre{font-size:11px;background:rgba(255,230,203,.04);padding:10px;border-radius:6px;overflow-x:auto;margin:8px 0}
.msg .copy-btn{position:absolute;top:6px;right:6px;font-size:10px;background:var(--surface);border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;display:none}
.msg:hover .copy-btn{display:block}.msg .copy-btn:hover{color:var(--text)}
.input-area{flex-shrink:0;padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font:inherit;font-size:13px;outline:none;resize:none;min-height:44px;max-height:200px;line-height:1.5}
.input-area textarea:focus{border-color:rgba(167,139,250,.3);box-shadow:0 0 0 2px rgba(167,139,250,.08)}
.input-area button{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font:inherit;font-size:12px;font-weight:600;white-space:nowrap;transition:opacity .12s}
.input-area button:hover{opacity:.9}.input-area button:disabled{opacity:.4;cursor:default}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:8px}.empty h2{font-size:20px;font-weight:700;color:var(--text2)}.empty p{font-size:12px}
.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}.typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite;opacity:.4}.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{opacity:.4;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.layout{flex:1;display:flex;overflow:hidden}
.rename-input{background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--text);font:inherit;font-size:13px;font-weight:600;outline:none;padding:2px 0;width:200px}
@media(max-width:600px){.chats-panel{display:none}.chats-panel.open{display:flex;position:absolute;inset:0;z-index:100;background:var(--bg);width:100%}.menu-btn{display:block!important}}
.model-picker{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:10px;color:var(--text2);margin-left:auto;transition:all .12s}.model-picker:hover{border-color:var(--accent);color:var(--text)}.model-picker .arrow{font-size:8px;margin-left:2px}.model-dropdown{position:absolute;right:16px;top:42px;background:var(--bg);border:1px solid var(--border);border-radius:8px;z-index:200;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.4);overflow:hidden}.model-dropdown .md-item{padding:8px 14px;font-size:11px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:space-between;transition:all .1s}.model-dropdown .md-item:hover{background:rgba(167,139,250,.08);color:var(--text)}.model-dropdown .md-item.active{background:rgba(167,139,250,.12);color:var(--accent)}.model-dropdown .md-provider{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}.menu-btn{display:none;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 6px}
</style>
</head>
<body>
<div class="header">
  <button class="menu-btn" onclick="document.getElementById('chats-panel').classList.toggle('open')">☰</button>
  <div class="logo">Hermes Chat</div>
  <div class="sub">Multi-Chat · Persistent</div>
  <div class="tabs">
    <span class="tab active" onclick="showTab('chat')">Chat</span>
    <span class="tab" onclick="showTab('dashboard')">Dashboard</span>
  </div>
</div>
<div class="layout">
  <div class="chats-panel" id="chats-panel">
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <div class="chats-list" id="chats-list"></div>
  </div>
  <div class="main" id="main">
    <div class="chat-header" id="chat-header">
      <span class="chat-title" id="chat-title-display" onclick="renameChat()" title="Click to rename"></span>
      <div class="model-picker" id="model-picker" onclick="toggleModelDropdown()">
        <span id="model-label">DeepSeek V4 Pro</span>
        <span class="arrow">▾</span>
      </div>
      <div class="model-dropdown" id="model-dropdown" style="display:none"></div>
    </div>
    <div class="empty" id="empty-state">
      <h2>Hermes Chat</h2>
      <p>Starte einen neuen Chat oder wähle links einen aus</p>
    </div>
    <div class="messages" id="messages" style="display:none"></div>
    <div class="typing" id="typing" style="display:none"><span></span><span></span><span></span></div>
    <div class="input-area" id="input-area" style="display:none">
      <textarea id="input" placeholder="Message Hermes... (Enter = send, Shift+Enter = new line)" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button onclick="send()" id="send-btn">Send</button>
    </div>
  </div>
</div>
<div class="dashboard" id="dashboard" style="display:none;flex:1;overflow-y:auto;padding:16px">
  <div id="dash-content" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px"></div>
  <div style="text-align:center;color:var(--text3);font-size:10px;margin-top:12px" id="dash-time"></div>
</div>

<script>
const BP = (location.hostname.includes('home')||location.hostname.includes('hass')||location.hostname.includes('local'))?'/api/hermes-chat':(location.origin+'/api/plugins/github-bot/ha/chat');
let currentChatId=null,haUser='default',chatTitle='',chatModel='deepseek-v4-pro';

async function api(path,opts={}){
  const r=await fetch(BP+path,{headers:{'Content-Type':'application/json','X-HA-User':haUser},...opts});
  return r.json();
}

async function loadChats(){
  const d=await api('/list');const el=document.getElementById('chats-list');
  el.innerHTML=d.chats?.map(c=>`<div class="chat-item${c.id===currentChatId?' active':''}" onclick="selectChat(${c.id})">
    <div class="title">${esc(c.title)}</div>
    <div class="meta"><span class="model-badge">${c.model||'default'}</span>${c.updated?.slice(0,10)}</div>
    <div class="actions"><button class="act-btn" onclick="event.stopPropagation();renameChat(${c.id},'${esc(c.title)}')" title="Rename">✎</button><button class="act-btn" onclick="event.stopPropagation();deleteChat(${c.id})" title="Delete">✕</button></div>
  </div>`).join('')||'';
}

async function newChat(){
  const model=chatModel||'deepseek-v4-pro';
  const d=await api('/create',{method:'POST',body:JSON.stringify({title:'New Chat',model})});
  currentChatId=d.id;chatTitle=d.title;chatModel=model;showChatUI();
}

async function selectChat(id){
  currentChatId=id;const d=await api('/'+id+'/messages');
  chatTitle=d.chat_title||'Chat';chatModel=d.chat_model||'deepseek-v4-pro';
  document.getElementById('model-label').textContent=allModels.find(m=>m.id===chatModel)?.name||chatModel;
  showChatUI();renderMessages(d.messages);loadChats();
}

function showChatUI(){
  document.getElementById('empty-state').style.display='none';
  document.getElementById('messages').style.display='flex';
  document.getElementById('input-area').style.display='flex';
  document.getElementById('chat-header').style.display='flex';
  document.getElementById('chat-title-display').textContent=chatTitle||'Chat';
  document.getElementById('input').focus();
}

function renderMessages(msgs){
  const el=document.getElementById('messages');
  el.innerHTML=(msgs||[]).map(m=>`<div class="msg ${m.role}">
    <button class="copy-btn" onclick="copyText(this,'${esc(m.content).replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">Copy</button>
    <div class="content">${formatContent(m.content)}</div>
    <div class="time">${m.time}</div>
  </div>`).join('')||'';
  el.scrollTop=el.scrollHeight;
}

function formatContent(c){return esc(c).replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>')}

async function send(){
  const input=document.getElementById('input');const text=input.value.trim();if(!text)return;if(!currentChatId)await newChat();
  const msgs=document.getElementById('messages');
  msgs.innerHTML+=`<div class="msg user"><div class="content">${esc(text)}</div></div>`;
  msgs.scrollTop=msgs.scrollHeight;input.value='';document.getElementById('send-btn').disabled=true;
  document.getElementById('typing').style.display='flex';
  try{
    const d=await api('/'+currentChatId+'/send',{method:'POST',body:JSON.stringify({content:text,model:chatModel})});
    document.getElementById('typing').style.display='none';
    msgs.innerHTML+=`<div class="msg assistant"><button class="copy-btn" onclick="copyText(this,'${esc(d.response).replace(/'/g,"\\'")}')">Copy</button><div class="content">${formatContent(d.response)}</div></div>`;
    msgs.scrollTop=msgs.scrollHeight;
  }catch(e){document.getElementById('typing').style.display='none';msgs.innerHTML+=`<div class="msg assistant"><div class="content">Fehler: ${e.message}</div></div>`}
  document.getElementById('send-btn').disabled=false;loadChats();
}

async function renameChat(id,oldTitle){
  if(!id)id=currentChatId;if(!id)return;
  const title=prompt('Chat umbenennen:',oldTitle||chatTitle||'Chat');
  if(!title||title===oldTitle)return;
  await api('/'+id+'/rename',{method:'POST',body:JSON.stringify({title})});
  chatTitle=title;document.getElementById('chat-title-display').textContent=title;loadChats();
}

async function changeModel(){
  chatModel=document.getElementById('model-select').value;
  if(currentChatId)await api('/'+currentChatId+'/model',{method:'POST',body:JSON.stringify({model:chatModel})});
}

async function deleteChat(id){if(!confirm('Chat löschen?'))return;await api('/'+id,{method:'DELETE'});if(currentChatId===id){currentChatId=null;document.getElementById('messages').style.display='none';document.getElementById('input-area').style.display='none';document.getElementById('chat-header').style.display='none';document.getElementById('empty-state').style.display='flex'}loadChats()}

function copyText(btn,text){navigator.clipboard.writeText(text).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='Copy',1500)})}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase().includes(tab)));
  document.getElementById('chats-panel').style.display=tab==='chat'?'':'none';
  document.getElementById('chat-header').style.display=tab==='chat'&&currentChatId?'flex':'none';
  document.getElementById('messages').style.display=tab==='chat'&&currentChatId?'flex':'none';
  document.getElementById('input-area').style.display=tab==='chat'&&currentChatId?'flex':'none';
  document.getElementById('empty-state').style.display=tab==='chat'&&!currentChatId?'flex':'none';
  document.getElementById('dashboard').style.display=tab==='dashboard'?'':'none';
  if(tab==='dashboard')loadDashboard();
}

async function loadDashboard(){
  try{
    const r=await fetch(BP.replace('/ha/chat','').replace('/api/hermes-chat','')+'/system/status');
    const d=await r.json();const el=document.getElementById('dash-content');
    const cards=[['Gateway',d.gateway_running?'Running':'Down',d.gateway_running?'#4ade80':'#ef4444','PID '+d.gateway_pid],['Webhook',d.webhook_active?'Active':'Inactive',d.webhook_active?'#4ade80':'#ef4444',d.webhook_events],['PostgreSQL',d.pg_status,d.pg_status==='connected'?'#4ade80':'#ef4444',d.pg_memories+' mem · '+d.pg_knowledge+' kb'],['CPU',d.cpu_usage||'?','#a78bfa','Load: '+d.load_1m],['RAM',d.ram_usage||'?','#a78bfa',d.ram_free+' / '+d.ram_total],['Disk',d.disk_usage,'#a78bfa',d.system_uptime],['Sessions',d.active_sessions,'#a78bfa','Total: '+d.total_sessions],['Plugins',d.plugin_count,'#4ade80',(d.plugin_list||[]).slice(0,3).join(', ')],['Issues',(d.issues||[]).length,(d.issues||[]).length?'#ef4444':'#4ade80',(d.issues||[])[0]?.msg||'All good']];
    el.innerHTML=cards.map(([t,v,c,sub])=>`<div style="padding:14px;border:1px solid rgba(255,230,203,.06);border-radius:8px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:4px">${t}</div><div style="font-size:22px;font-weight:700;color:${c||'var(--text)'};margin-bottom:2px">${v}</div><div style="font-size:9px;color:var(--text3);line-height:1.3">${sub}</div></div>`).join('');
    document.getElementById('dash-time').textContent='Updated: '+new Date().toLocaleTimeString();
  }catch(e){document.getElementById('dash-content').innerHTML='<div style="color:var(--red);padding:20px">Dashboard unavailable</div>'}
}
setInterval(()=>{if(document.getElementById('dashboard').style.display!=='none')loadDashboard()},30000);

let allModels=[{id:"deepseek-v4-pro",name:"DeepSeek V4 Pro",provider:"deepseek"}];

async function loadModels(){
  try{const r=await fetch('/api/models');const d=await r.json();if(d.models)allModels=d.models}
  catch{/* keep defaults */}
  buildModelDropdown();
}
function buildModelDropdown(){
  const el=document.getElementById('model-dropdown');
  el.innerHTML=allModels.map(m=>`<div class="md-item${m.id===chatModel?' active':''}" onclick="selectModel('${m.id}','${m.name}')">
    <span>${m.name}</span><span class="md-provider">${m.provider}</span></div>`).join('');
}
function toggleModelDropdown(){
  const el=document.getElementById('model-dropdown');
  el.style.display=el.style.display==='none'?'':'none';
  buildModelDropdown();
}
function selectModel(id,name){
  chatModel=id;document.getElementById('model-label').textContent=name;
  document.getElementById('model-dropdown').style.display='none';
  if(currentChatId)api('/'+currentChatId+'/model',{method:'POST',body:JSON.stringify({model:id})});
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.model-picker')&&!e.target.closest('.model-dropdown'))
    document.getElementById('model-dropdown').style.display='none';
});

loadModels();loadChats();setInterval(loadChats,30000);
</script>
</body>
</html>
